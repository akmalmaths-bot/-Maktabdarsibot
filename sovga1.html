<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xayrlashuv Sovg'asi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- PDF yaratish uchun kerakli kutubxonalar -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    animation: {
                        blob: "blob 7s infinite",
                        pulse_slow: "pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite",
                    },
                    keyframes: {
                        blob: {
                            "0%": { transform: "translate(0px, 0px) scale(1)" },
                            "33%": { transform: "translate(30px, -50px) scale(1.1)" },
                            "66%": { transform: "translate(-20px, 20px) scale(0.9)" },
                            "100%": { transform: "translate(0px, 0px) scale(1)" }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        /* Shisha effekti uchun maxsus klasslar */
        .glass-panel {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.5);
        }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        
        /* Ekranga silliq kirib kelish */
        .fade-in {
            animation: fadeIn 0.5s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        select {
            appearance: none;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 20 20'%3e%3cpath stroke='%236b7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='1.5' d='M6 8l4 4 4-4'/%3e%3c/svg%3e");
            background-position: right 0.5rem center;
            background-repeat: no-repeat;
            background-size: 1.5em 1.5em;
        }
    </style>
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-4 font-sans relative overflow-hidden text-slate-800">

    <div class="fixed inset-0 w-full h-full -z-10 overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] left-[-10%] w-72 h-72 md:w-96 md:h-96 bg-purple-300 rounded-full mix-blend-multiply filter blur-[60px] opacity-60 animate-blob"></div>
        <div class="absolute top-[10%] right-[-10%] w-72 h-72 md:w-96 md:h-96 bg-indigo-300 rounded-full mix-blend-multiply filter blur-[60px] opacity-60 animate-blob animation-delay-2000"></div>
        <div class="absolute bottom-[-20%] left-[20%] w-72 h-72 md:w-96 md:h-96 bg-pink-300 rounded-full mix-blend-multiply filter blur-[60px] opacity-60 animate-blob animation-delay-4000"></div>
    </div>

    <div id="login-screen" class="glass-panel rounded-[2rem] shadow-2xl shadow-indigo-500/10 p-8 md:p-10 max-w-lg w-full text-center transition-all duration-500 fade-in relative overflow-hidden">
        
        <!-- Yuqoridagi bezak -->
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-purple-500 via-indigo-500 to-pink-500"></div>

        <div class="inline-block p-4 bg-indigo-50 rounded-full mb-4 shadow-inner">
            <span class="text-4xl animate-pulse_slow block">🎁</span>
        </div>
        
        <h1 class="text-3xl md:text-4xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-2 tracking-tight">
            Xayrlashuv sovg'asi
        </h1>
        <p class="text-slate-500 font-medium mb-8">Guruhimizning maxfiy sovg'a ulashish tizimi</p>
        
        <div class="mb-8 text-left">
            <label class="block text-slate-700 font-bold mb-3 pl-1 text-sm uppercase tracking-wider">O'z ismingizni tanlang</label>
            <div class="relative">
                <select id="student-list" class="w-full p-4 pr-10 border border-slate-200 rounded-2xl focus:outline-none focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 bg-white shadow-sm text-slate-700 font-medium text-lg cursor-pointer transition-all hover:border-indigo-300">
                    <!-- Javascript orqali to'ldiriladi -->
                </select>
            </div>
        </div>

        <button id="login-btn" onclick="login()" class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-bold py-4 px-4 rounded-2xl hover:from-indigo-700 hover:to-purple-700 hover:shadow-xl hover:shadow-indigo-500/30 active:scale-[0.98] transition-all duration-300 text-lg mb-6">
            Tizimga kirish
        </button>

        <!-- PDF Yuklab olish tugmasi -->
        <div class="border-t border-slate-200 pt-4">
            <button onclick="downloadPDF()" class="text-sm text-indigo-600 font-semibold hover:text-indigo-800 transition-colors flex items-center justify-center w-full">
                <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                Barcha natijalarni PDF yuklab olish
            </button>
        </div>
    </div>

    <div id="dashboard-screen" class="glass-panel rounded-[2rem] shadow-2xl shadow-indigo-500/10 p-8 md:p-10 max-w-lg w-full text-center hidden transition-all duration-500 fade-in relative">
        
        <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-green-400 to-emerald-500"></div>

        <h2 id="welcome-msg" class="text-2xl font-extrabold text-slate-800 mb-1"></h2>
        <p class="text-slate-500 font-medium mb-8">Tizim siz uchun eng zo'r juftlikni aniqladi!</p>
        
        <div class="bg-gradient-to-br from-indigo-50 to-purple-50 p-8 rounded-3xl mb-8 border border-white shadow-inner relative overflow-hidden group">
            <!-- Orqa fon bezaklari -->
            <div class="absolute -right-10 -top-10 text-8xl opacity-10 transform rotate-12 transition-transform group-hover:scale-110 duration-500">✨</div>
            
            <p class="text-slate-500 mb-3 font-semibold text-sm uppercase tracking-widest">Sizning sovg'angiz egasi:</p>
            <div id="result-box" class="text-2xl md:text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 leading-tight">
                Yuklanmoqda...
            </div>
        </div>
        
        <button onclick="logout()" class="w-full bg-slate-100 text-slate-600 font-bold py-4 px-4 rounded-2xl hover:bg-slate-200 active:scale-[0.98] transition-all duration-300 border border-slate-200">
            ← Boshqa talaba uchun chiqish
        </button>
    </div>

    <script>
        // Talabalar ro'yxati (46 nafar) - Nodirbek muvozanat uchun "qiz" deb olingan
        const rawStudents = [
            { name: "ABBOSXONOV OLLOYORXON", gender: "yigit" },
            { name: "ABDIRASHIDOV JAVOHIR", gender: "yigit" },
            { name: "ABDUKADIROV SUXROB", gender: "yigit" },
            { name: "ABDULMUXTOROVA MASHHURAXON", gender: "qiz" },
            { name: "ABDUMUTALOVA AZIZA", gender: "qiz" },
            { name: "ABDURASULOV OTABEK", gender: "yigit" },
            { name: "ABDUXALILOVA MUBINAXON", gender: "qiz" },
            { name: "ACHILOVA MADINABONU", gender: "qiz" },
            { name: "ARSLONOV IBROHIM", gender: "yigit" },
            { name: "AXMATOVA OSUDA", gender: "qiz" },
            { name: "ERGASHEV XAMDAM", gender: "yigit" },
            { name: "ERGASHEVA VAZIRA", gender: "qiz" },
            { name: "ESHBULATOV ABDULLA", gender: "yigit" },
            { name: "G'ANIJONOV NODIRBEK", gender: "qiz" }, // <-- DIQQAT: Balans qilingan!
            { name: "HASANOVA ORASTA", gender: "qiz" },
            { name: "HAZRATOVA MASHHURA", gender: "qiz" },
            { name: "HIKMATILLAYEV JAVOHIR", gender: "yigit" },
            { name: "HUSANOVA NURXAYOT", gender: "qiz" },
            { name: "ISMAILOVA MUXTASAR", gender: "qiz" },
            { name: "JALILOV DIYORBEK", gender: "yigit" },
            { name: "JAMG'IROV DIYORBEK", gender: "yigit" },
            { name: "JIYENBAYEV ELBEK", gender: "yigit" },
            { name: "JO'RAQO'ZIYEV AKMALJON", gender: "yigit" },
            { name: "JO'RAYEV DILMUROD", gender: "yigit" },
            { name: "JUMANAZAROVA ZARINA", gender: "qiz" },
            { name: "MAMATQULOVA GAVXAR", gender: "qiz" },
            { name: "MIRYAXYOYEVA OMINA", gender: "qiz" },
            { name: "MUHITDINOVA SUG'DIYONA", gender: "qiz" },
            { name: "MURTOZAYEVA OYGO'ZAL", gender: "qiz" },
            { name: "NABIYEVA AZIZA", gender: "qiz" },
            { name: "OCHILOV XUSNIDDIN", gender: "yigit" },
            { name: "OMONJONOVA OQILAXON", gender: "qiz" },
            { name: "OYXUJAYEVA RUXSORA", gender: "qiz" },
            { name: "QALANDAROV SANJARBEK", gender: "yigit" },
            { name: "RAHMONJONOVA SHAHRIBONU", gender: "qiz" },
            { name: "RO'ZMATOVA NOZIMA", gender: "qiz" },
            { name: "RUSTAMBEKOV ABBOS", gender: "yigit" },
            { name: "SHAMSIDDINOV FIRDAVS", gender: "yigit" },
            { name: "SULTONOV ALISHER", gender: "yigit" },
            { name: "TANGIROVA GULSEVAR", gender: "qiz" },
            { name: "TURSUNOV IQBOLJON", gender: "yigit" },
            { name: "UMIROV FIRDAVS", gender: "yigit" },
            { name: "XO'JAMURATOV AVAZBEK", gender: "yigit" },
            { name: "XUDAYBERDIYEV SHAXRIYOR", gender: "yigit" },
            { name: "XUDAYOROVA SEVINCH", gender: "qiz" },
            { name: "ZAYNIDDINOV AXRORXON", gender: "yigit" }
        ];

        const selectEl = document.getElementById("student-list");
        
        let defaultOpt = document.createElement("option");
        defaultOpt.text = "Iltimos, ismingizni tanlang";
        defaultOpt.value = "";
        defaultOpt.disabled = true;
        defaultOpt.selected = true;
        selectEl.appendChild(defaultOpt);

        rawStudents.forEach((student, index) => {
            let opt = document.createElement("option");
            opt.value = index; 
            const icon = student.gender === "yigit" ? "👨‍🎓" : "👩‍🎓";
            opt.text = `${icon} ${student.name}`;
            selectEl.appendChild(opt);
        });

        window.onload = () => {
            if (!localStorage.getItem("drawComplete")) {
                initSecretSantaDrawLocal();
            }
            const savedUser = localStorage.getItem("giftUserId");
            if(savedUser) {
                showDashboard(savedUser);
            }
        };

        window.login = () => {
            const selectedIdx = selectEl.value;
            if(selectedIdx === "") {
                // Agar tanlamasa, silkitib qo'yish animatsiyasi qo'shish mumkin, hozircha oddiy qaytaradi
                selectEl.classList.add('border-red-500', 'ring-red-500/20');
                setTimeout(() => selectEl.classList.remove('border-red-500', 'ring-red-500/20'), 1000);
                return;
            }
            
            const studentId = `student_${selectedIdx}`;
            localStorage.setItem("giftUserId", studentId);
            showDashboard(studentId);
        };

        function initSecretSantaDrawLocal() {
            // Yigitlar va Qizlarni ajratib, tasodifiy aralashtiramiz
            let yigitlar = rawStudents.map((s, i) => ({...s, id: `student_${i}`})).filter(s => s.gender === 'yigit').sort(() => 0.5 - Math.random());
            let qizlar = rawStudents.map((s, i) => ({...s, id: `student_${i}`})).filter(s => s.gender === 'qiz').sort(() => 0.5 - Math.random());

            let results = {}; 
            
            // 23 ta yigit va 23 ta qiz mavjud
            // Zanjir tuzamiz: Yigit qizga, Qiz yigitga
            for (let i = 0; i < 23; i++) {
                // Yigit qizga beradi
                results[yigitlar[i].id] = qizlar[i].name;
                
                // Qiz keyingi yigitga beradi (Zanjir bo'lishi uchun)
                let keyingiYigit = (i + 1 < 23) ? yigitlar[i+1] : yigitlar[0];
                results[qizlar[i].id] = keyingiYigit.name;
            }

            localStorage.setItem("drawComplete", "true");
            localStorage.setItem("pairs", JSON.stringify(results));
        }

        function showDashboard(studentId) {
            document.getElementById("login-screen").classList.add("hidden");
            
            // Oynani silliq ko'rsatish
            const dashScreen = document.getElementById("dashboard-screen");
            dashScreen.classList.remove("hidden");
            dashScreen.classList.add("fade-in");

            const myIdx = parseInt(studentId.split('_')[1]);
            document.getElementById("welcome-msg").innerText = rawStudents[myIdx].name;

            const pairs = JSON.parse(localStorage.getItem("pairs"));
            if(pairs) {
                document.getElementById("result-box").innerText = pairs[studentId] || "Xatolik yuz berdi";
            }
        }

        window.logout = () => {
            // Brauzer xotirasidan O'ZINI o'chiradi (natijalarni emas)
            localStorage.removeItem("giftUserId");
            
            // Ekrandan yo'qolish animatsiyasi
            document.getElementById("dashboard-screen").classList.add("hidden");
            document.getElementById("login-screen").classList.remove("hidden");
            
            // Select ni bo'sh holatga qaytarish
            selectEl.value = "";
        };

        // PDF Yuklab olish funksiyasi
        window.downloadPDF = () => {
            const pairsJson = localStorage.getItem("pairs");
            if (!pairsJson) {
                alert("Natijalar hali yaratilmagan!");
                return;
            }

            const pairs = JSON.parse(pairsJson);
            const tableData = [];

            // pairs ma'lumotlarini o'qish va jadvalga tayyorlash
            for (const giverId in pairs) {
                const giverIdx = parseInt(giverId.split('_')[1]);
                const giverName = rawStudents[giverIdx].name;
                const receiverName = pairs[giverId];
                tableData.push([giverName, receiverName]);
            }

            // Alifbo tartibida taxlash (Kim berishi bo'yicha)
            tableData.sort((a, b) => a[0].localeCompare(b[0]));

            // PDF yaratish
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            // PDF sarlavhasi
            doc.setFontSize(16);
            doc.setTextColor(79, 70, 229); // Indigo rangi
            doc.text("Xayrlashuv Sovg'asi - Tolik Natijalar Ro'yxati", 14, 20);
            
            doc.setFontSize(10);
            doc.setTextColor(100);
            doc.text(`Sana: ${new Date().toLocaleDateString('uz-UZ')}`, 14, 28);

            // Jadvalni chizish
            doc.autoTable({
                startY: 35,
                head: [['KIM BERADI (Sovg\'a beruvchi)', 'KIMGA BERADI (Sovg\'a oluvchi)']],
                body: tableData,
                theme: 'grid',
                headStyles: { 
                    fillColor: [79, 70, 229], // Tailwind indigo-600
                    textColor: 255,
                    fontStyle: 'bold'
                },
                styles: { 
                    fontSize: 10,
                    cellPadding: 4
                },
                alternateRowStyles: {
                    fillColor: [248, 250, 252] // Tailwind slate-50
                }
            });

            // Faylni yuklab olish
            doc.save("Sovga_Natijalari.pdf");
        };

    </script>
</body>
</html>
