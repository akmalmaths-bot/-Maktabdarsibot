<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ustoz Paneli | Yakuniy Imtihon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        /* --- PDF PRINT STYLES --- */
        @media print {
            body { background-color: #ffffff !important; }
            header, .print-hide, #detailsModal { display: none !important; }
            main { padding: 0 !important; max-width: 100% !important; margin: 0 !important; }
            .shadow-sm, .shadow-lg { box-shadow: none !important; }
            .bg-slate-50 { background-color: #ffffff !important; }
            .border-slate-200 { border-color: #cbd5e1 !important; }
            * { -webkit-print-color-adjust: exact !important; color-adjust: exact !important; }
            table { width: 100% !important; }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-indigo-700 text-white shadow-lg sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-white/20 rounded-lg flex items-center justify-center text-xl">
                    <i class="fa-solid fa-chalkboard-user"></i>
                </div>
                <h1 class="text-xl md:text-2xl font-black tracking-wide">Ustoz Paneli</h1>
            </div>
            <div id="connection-status" class="flex items-center gap-2 text-sm font-bold bg-indigo-800 px-4 py-2 rounded-lg border border-indigo-600 shadow-inner">
                <span class="w-3 h-3 rounded-full bg-yellow-400 animate-pulse"></span> Ulanmoqda...
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-7xl mx-auto w-full px-4 py-8">
        <div id="errorMessage" class="hidden bg-red-100 border-l-4 border-red-500 text-red-700 p-4 mb-6 shadow-sm rounded-r-lg font-bold">
            <!-- Xatoliklar shu yerda chiqadi -->
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex items-center gap-4">
                <div class="w-14 h-14 bg-blue-100 text-blue-600 rounded-xl flex items-center justify-center text-2xl"><i class="fa-solid fa-users"></i></div>
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Test Ishlaganlar</p>
                    <p class="text-3xl font-black text-slate-800"><span id="statTotalStudents">0</span> <span class="text-sm font-bold text-slate-500">ta</span></p>
                </div>
            </div>
            
            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex items-center gap-4">
                <div class="w-14 h-14 bg-green-100 text-green-600 rounded-xl flex items-center justify-center text-2xl"><i class="fa-solid fa-chart-line"></i></div>
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">O'rtacha Ball</p>
                    <p class="text-3xl font-black text-slate-800"><span id="statAvgScore">0</span> <span class="text-sm font-bold text-slate-500">/ 30</span></p>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-slate-200 flex items-center gap-4">
                <div class="w-14 h-14 bg-purple-100 text-purple-600 rounded-xl flex items-center justify-center text-2xl"><i class="fa-solid fa-stopwatch"></i></div>
                <div>
                    <p class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">O'rtacha Vaqt</p>
                    <p class="text-2xl font-black text-slate-800" id="statAvgTime">0 daq</p>
                </div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden flex flex-col">
            <div class="p-5 md:p-6 border-b border-slate-200 flex flex-col sm:flex-row justify-between items-center gap-4 bg-slate-50">
                <h2 class="text-xl font-bold text-slate-800"><i class="fa-solid fa-list-ol text-indigo-500 mr-2"></i> Reyting Jadvali</h2>
                
                <div class="flex items-center gap-3 w-full sm:w-auto print-hide">
                    <!-- PDF YUKLAB OLISH TUGMASI -->
                    <button onclick="window.print()" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg text-sm shadow-sm transition-transform active:scale-95 flex items-center gap-2 whitespace-nowrap">
                        <i class="fa-solid fa-file-pdf"></i> PDF Yuklash
                    </button>
                    
                    <div class="relative w-full sm:w-64">
                        <input type="text" id="searchInput" placeholder="O'quvchini qidiring..." class="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-300 focus:outline-none focus:border-indigo-500 text-sm transition-colors">
                        <i class="fa-solid fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
                    </div>
                </div>
            </div>

            <div class="overflow-x-auto relative min-h-[300px]">
                <table class="w-full text-left border-collapse whitespace-nowrap">
                    <thead class="bg-slate-100 sticky top-0 z-10 shadow-sm">
                        <tr class="text-xs uppercase tracking-widest text-slate-500 font-bold border-b-2 border-slate-200">
                            <th class="px-6 py-4 text-center w-16">#</th>
                            <th class="px-6 py-4">Ism Familiya</th>
                            <th class="px-6 py-4 text-center">To'g'ri Javoblar</th>
                            <th class="px-6 py-4 text-center">Sarflangan Vaqt</th>
                            <th class="px-6 py-4 text-center">Sana / Vaqt</th>
                            <th class="px-6 py-4 text-center print-hide">Tahlil</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-slate-100">
                        <tr>
                            <td colspan="6" class="px-6 py-12 text-center text-slate-500 font-medium">
                                <i class="fa-solid fa-spinner fa-spin text-2xl mb-2 text-indigo-500"></i><br>
                                Ma'lumotlar yuklanmoqda...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- MODAL -->
    <div id="detailsModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 hidden flex-col items-center justify-center p-4 fade-in">
        <div class="bg-white w-full max-w-4xl max-h-[90vh] rounded-2xl shadow-2xl flex flex-col overflow-hidden">
            <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                <div>
                    <h3 class="text-xl font-black text-slate-800" id="modalStudentName">O'quvchi Ismi</h3>
                    <p class="text-sm font-bold text-slate-500 mt-1">Savollar tahlili va javoblar tarixi</p>
                </div>
                <button onclick="closeModal()" class="w-10 h-10 rounded-full bg-slate-200 hover:bg-red-100 hover:text-red-600 text-slate-600 transition-colors flex items-center justify-center font-bold">
                    <i class="fa-solid fa-xmark text-xl"></i>
                </button>
            </div>
            <div class="px-6 py-4 bg-indigo-50 border-b border-indigo-100 flex flex-wrap gap-4 text-sm">
                <div class="bg-white px-4 py-2 rounded-lg border border-indigo-200 shadow-sm font-bold text-indigo-800">
                    Natija: <span id="modalScore" class="text-indigo-600 text-lg">0 / 30</span>
                </div>
                <div class="bg-white px-4 py-2 rounded-lg border border-indigo-200 shadow-sm font-bold text-indigo-800">
                    Vaqt: <span id="modalTime" class="text-indigo-600 text-lg">0 daq</span>
                </div>
            </div>
            <div class="p-6 overflow-y-auto flex-grow bg-slate-50">
                <div id="modalAnswersList" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // BAZA SOZLAMALARI
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : { 
            apiKey: "AIzaSyAkEt0HxuL62v832nMpH8D36bR28FU7dhk", 
            authDomain: "maktab-darslari.firebaseapp.com", 
            projectId: "maktab-darslari", 
            storageBucket: "maktab-darslari.firebasestorage.app", 
            messagingSenderId: "375361700394", 
            appId: "1:375361700394:web:c7b74f29fb302e7743f953" 
        };
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'maktab-darslari';
        
        let db;
        let allResults = []; 

        const connStatus = document.getElementById('connection-status');
        const tableBody = document.getElementById('tableBody');
        const searchInput = document.getElementById('searchInput');
        const modal = document.getElementById('detailsModal');
        const errorMsg = document.getElementById('errorMessage');
        
        const formatTime = (totalSeconds) => {
            if (totalSeconds == null || isNaN(totalSeconds)) return "Noma'lum";
            const m = Math.floor(totalSeconds / 60); const s = totalSeconds % 60;
            return m > 0 ? `${m} daq ${s} s` : `${s} soniya`;
        };

        const formatDate = (timestamp) => {
            if (!timestamp) return "Hozirgina";
            const d = timestamp.toDate ? timestamp.toDate() : new Date();
            return `${d.getDate().toString().padStart(2, '0')}.${(d.getMonth()+1).toString().padStart(2, '0')}.${d.getFullYear()} <span class="text-slate-400 ml-1">${d.getHours().toString().padStart(2, '0')}:${d.getMinutes().toString().padStart(2, '0')}</span>`;
        };

        const initApp = async () => {
            try {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                db = getFirestore(app);

                // --- MANA SHU YERDA XATO BOR EDI (TO'G'RILANDI) ---
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token); // Ustoz huquqi bilan kirish
                } else {
                    await signInAnonymously(auth);
                }

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        connStatus.innerHTML = `<span class="w-3 h-3 rounded-full bg-green-400 shadow-[0_0_8px_#4ade80]"></span> Bazaga Ulangan`;
                        connStatus.classList.replace('bg-indigo-800', 'bg-green-800');
                        connStatus.classList.replace('border-indigo-600', 'border-green-600');
                        fetchData();
                    }
                });
            } catch (error) {
                connStatus.innerHTML = `<span class="w-3 h-3 rounded-full bg-red-400"></span> Xatolik`;
                errorMsg.innerHTML = "Tizim ishga tushishida xatolik: " + error.message;
                errorMsg.classList.remove('hidden');
            }
        };

        const fetchData = () => {
            const resultsRef = collection(db, 'artifacts', appId, 'public', 'data', 'yakuniy_exam_results');
            
            onSnapshot(resultsRef, (snapshot) => {
                allResults = [];
                let totalScore = 0; let totalTime = 0; let studentsWithTime = 0;

                snapshot.forEach(doc => {
                    const data = { id: doc.id, ...doc.data() };
                    allResults.push(data);
                    totalScore += data.score || 0;
                    if (data.timeSpent) { totalTime += data.timeSpent; studentsWithTime++; }
                });

                document.getElementById('statTotalStudents').textContent = allResults.length;
                document.getElementById('statAvgScore').textContent = allResults.length ? (totalScore / allResults.length).toFixed(1) : 0;
                document.getElementById('statAvgTime').textContent = studentsWithTime ? formatTime(Math.floor(totalTime / studentsWithTime)) : "0 daq";

                renderTable();
            }, (err) => {
                errorMsg.innerHTML = "Bazadan o'qishda xatolik yuz berdi. Xato: " + err.message;
                errorMsg.classList.remove('hidden');
                tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-8 text-center text-red-500 font-bold">Ma'lumotlar yuklanmadi.</td></tr>`;
            });
        };

        const renderTable = (searchTerm = "") => {
            let sortedData = [...allResults].sort((a, b) => {
                if (b.score !== a.score) return (b.score || 0) - (a.score || 0);
                return (a.timeSpent || 0) - (b.timeSpent || 0);
            });

            if (searchTerm) sortedData = sortedData.filter(r => r.name && r.name.toLowerCase().includes(searchTerm.toLowerCase()));
            tableBody.innerHTML = '';
            
            if (sortedData.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-500 font-medium text-lg"><i class="fa-regular fa-folder-open text-4xl mb-3 opacity-50 block"></i> Hali hech kim test ishlamadi.</td></tr>`;
                return;
            }

            sortedData.forEach((student, index) => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-indigo-50/40 transition-colors bg-white";
                let rankClass = "text-slate-500";
                if (index === 0) rankClass = "text-yellow-500 text-xl drop-shadow-md";
                else if (index === 1) rankClass = "text-slate-400 text-lg";
                else if (index === 2) rankClass = "text-amber-600 text-lg";

                tr.innerHTML = `
                    <td class="px-6 py-4 text-center font-black ${rankClass}">${index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : index + 1}</td>
                    <td class="px-6 py-4 font-black text-indigo-950">${student.name || "Nomsiz"}</td>
                    <td class="px-6 py-4 text-center"><span class="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full font-black text-sm border border-indigo-200">${student.score || 0} / ${student.total || 30}</span></td>
                    <td class="px-6 py-4 text-center font-bold text-slate-600 text-sm">${formatTime(student.timeSpent)}</td>
                    <td class="px-6 py-4 text-center text-sm font-bold text-slate-600">${formatDate(student.timestamp)}</td>
                    <td class="px-6 py-4 text-center print-hide"><button onclick="window.openStudentDetails('${student.id}')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-2 px-4 rounded-lg text-xs shadow-sm transition-transform active:scale-95 flex items-center gap-2 mx-auto"><i class="fa-solid fa-eye"></i> Tahlil</button></td>
                `;
                tableBody.appendChild(tr);
            });
        };

        searchInput.addEventListener('input', (e) => { renderTable(e.target.value); });

        window.openStudentDetails = (docId) => {
            const student = allResults.find(r => r.id === docId);
            if(!student) return;
            document.getElementById('modalStudentName').textContent = student.name;
            document.getElementById('modalScore').textContent = `${student.score || 0} / ${student.total || 30}`;
            document.getElementById('modalTime').textContent = formatTime(student.timeSpent);

            const listEl = document.getElementById('modalAnswersList');
            listEl.innerHTML = '';

            if (!student.answers || student.answers.length === 0) {
                listEl.innerHTML = `<div class="p-8 text-center text-slate-500 font-bold bg-white rounded-xl border border-slate-200">O'quvchi javoblari saqlanmagan.</div>`;
            } else {
                student.answers.forEach((ans, idx) => {
                    const isCorrect = ans.isCorrect; const isTimeout = ans.selected === null;
                    const bgClass = isCorrect ? 'bg-white border-l-4 border-l-green-500' : 'bg-white border-l-4 border-l-red-500';
                    const icon = isCorrect ? `<div class="w-8 h-8 rounded-full bg-green-100 text-green-600 flex items-center justify-center shrink-0 border border-green-200"><i class="fa-solid fa-check"></i></div>` : `<div class="w-8 h-8 rounded-full bg-red-100 text-red-600 flex items-center justify-center shrink-0 border border-red-200"><i class="fa-solid fa-xmark"></i></div>`;
                    let userAnsHtml = isTimeout ? `<span class="bg-slate-100 text-slate-500 font-bold px-2 py-1 rounded border border-slate-300 text-xs italic">Vaqt tugagan (Tanlanmagan)</span>` : `<span class="bg-slate-100 font-black px-3 py-1 rounded border border-slate-300 text-sm ${isCorrect ? 'text-green-700' : 'text-red-700 line-through'}">${ans.selected}</span>`;
                    let correctHtml = !isCorrect ? `<div class="mt-3 bg-green-50 border border-green-200 rounded-lg p-2 text-sm flex items-center gap-2 text-green-800 font-bold"><i class="fa-solid fa-check-double opacity-70"></i> To'g'ri javob: <span class="bg-white px-2 rounded shadow-sm border border-green-100">${ans.correct}</span></div>` : '';

                    listEl.innerHTML += `
                    <div class="${bgClass} p-4 rounded-r-xl border-y border-r border-slate-200 shadow-sm flex gap-4">
                        ${icon}
                        <div class="flex-grow">
                            <p class="font-bold text-slate-800 text-sm leading-relaxed mb-3"><span class="text-indigo-500 mr-1">${idx + 1}.</span> ${ans.q || "Savol matni yo'q"}</p>
                            <div class="flex items-center gap-3"><span class="text-xs font-bold text-slate-400 uppercase tracking-widest">Belgilangan:</span>${userAnsHtml}</div>
                            ${correctHtml}
                        </div>
                    </div>`;
                });
            }
            modal.classList.remove('hidden'); modal.classList.add('flex'); document.body.style.overflow = 'hidden'; 
        };

        window.closeModal = () => { modal.classList.add('hidden'); modal.classList.remove('flex'); document.body.style.overflow = 'auto'; };
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
