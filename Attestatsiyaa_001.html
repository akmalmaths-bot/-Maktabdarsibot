                    <button 
                      onClick={() => setShowConfirm(true)}
                      className="px-4 py-2 bg-red-100 text-red-700 rounded hover:bg-red-200 font-medium transition"
                    >
                      Yakunlash
                    </button>
                  </div>
                </div>

                {/* Main Content */}
                <div className="flex-1 flex flex-col md:flex-row max-w-7xl mx-auto w-full p-4 gap-6">
                  
                  {/* Question Area */}
                  <div className="flex-1 bg-white rounded-2xl shadow-sm p-6 flex flex-col">
                    <div className="mb-6 flex justify-between items-center border-b pb-4">
                      <span className="bg-blue-100 text-blue-800 text-sm font-bold px-3 py-1 rounded-full">
                        {question.subject}
                      </span>
                      <span className="text-gray-500 font-medium">
                        Savol {currentQuestion + 1} / 50
                      </span>
                    </div>
                    
                    <h2 className="text-xl md:text-2xl font-medium text-gray-800 mb-8 leading-relaxed">
                      {currentQuestion + 1}. {question.question}
                    </h2>

                    <div className="space-y-3 flex-1">
                      {question.options.map((option, idx) => (
                        <button
                          key={idx}
                          onClick={() => handleOptionSelect(idx)}
                          className={`w-full text-left p-4 rounded-xl border-2 transition-all flex items-center gap-4 text-lg
                            ${answers[currentQuestion] === idx 
                              ? 'border-blue-600 bg-blue-50 text-blue-900 shadow-sm' 
                              : 'border-gray-200 hover:border-blue-300 hover:bg-gray-50 text-gray-700'
                            }`}
                        >
                          <span className={`w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shrink-0
                            ${answers[currentQuestion] === idx ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-600'}
                          `}>
                            {['A', 'B', 'C', 'D'][idx]}
                          </span>
                          {option}
                        </button>
                      ))}
                    </div>

                    <div className="mt-4 text-right text-sm text-gray-400 italic">
                      Yaratuvchi: Akmaljon Jo'raqo'ziyev
                    </div>

                    {/* Navigation Buttons */}
                    <div className="mt-8 flex justify-between items-center pt-4 border-t">
                      <button
                        onClick={() => setCurrentQuestion(prev => Math.max(0, prev - 1))}
                        disabled={currentQuestion === 0}
                        className="px-6 py-3 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 disabled:opacity-50 disabled:cursor-not-allowed font-medium transition"
                      >
                        &larr; Oldingi
                      </button>
                      
                      {currentQuestion < 49 ? (
                        <button
                          onClick={() => setCurrentQuestion(prev => Math.min(49, prev + 1))}
                          className="px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium transition shadow-md"
                        >
                          Keyingi &rarr;
                        </button>
                      ) : (
                        <button
                          onClick={() => setShowConfirm(true)}
                          className="px-6 py-3 bg-green-600 text-white rounded-lg hover:bg-green-700 font-medium transition shadow-md"
                        >
                          Testni Yakunlash
                        </button>
                      )}
                    </div>
                  </div>

                  {/* Sidebar / Grid Navigation */}
                  <div className="w-full md:w-80 bg-white rounded-2xl shadow-sm p-4 h-fit">
                    <h3 className="font-bold text-gray-700 mb-4 text-center">Savollar paneli</h3>
                    <div className="grid grid-cols-5 gap-2">
                      {answers.map((ans, idx) => (
                        <button
                          key={idx}
                          onClick={() => setCurrentQuestion(idx)}
                          className={`h-10 w-full rounded font-medium flex items-center justify-center border transition-all
                            ${currentQuestion === idx ? 'ring-2 ring-blue-600 scale-110 z-10' : ''}
                            ${ans !== null 
                              ? 'bg-blue-600 text-white border-blue-600' 
                              : 'bg-gray-50 text-gray-500 border-gray-200 hover:bg-gray-100'
                            }
                          `}
                        >
                          {idx + 1}
                        </button>
                      ))}
                    </div>
                    <div className="mt-6 flex flex-col gap-2 text-sm text-gray-600">
                      <div className="flex items-center gap-2">
                        <div className="w-4 h-4 bg-blue-600 rounded"></div> Belgilangan
                      </div>
                      <div className="flex items-center gap-2">
                        <div className="w-4 h-4 bg-gray-50 border border-gray-200 rounded"></div> Belgilanmagan
                      </div>
                    </div>
                  </div>
                </div>

                {/* Yakunlash uchun maxsus modal oynasi */}
                {showConfirm && (
                  <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4">
                    <div className="bg-white rounded-2xl shadow-xl p-6 max-w-sm w-full">
                      <h3 className="text-xl font-bold text-gray-800 mb-4">Testni yakunlaysizmi?</h3>
                      <p className="text-gray-600 mb-6">Barcha belgilagan javoblaringiz bo'yicha natijangiz hisoblanadi.</p>
                      <div className="flex justify-end gap-3">
                        <button 
                          onClick={() => setShowConfirm(false)}
                          className="px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 font-medium transition"
                        >
                          Bekor qilish
                        </button>
                        <button 
                          onClick={() => {
                            setShowConfirm(false);
                            finishTest();
                          }}
                          className="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-medium transition"
                        >
                          Yakunlash
                        </button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            );
          }

          if (appState === 'result') {
            const correctAnswers = calculateScore();
            const totalPoints = correctAnswers * 2;
            
            let category = "Qoniqarsiz / Mutaxassis";
            let colorClass = "text-red-600";
            if (totalPoints >= 80) { category = "Oliy toifa darajasi"; colorClass = "text-green-600"; }
            else if (totalPoints >= 70) { category = "1-toifa darajasi"; colorClass = "text-blue-600"; }
            else if (totalPoints >= 60) { category = "2-toifa darajasi"; colorClass = "text-yellow-600"; }

            return (
              <div className="min-h-screen bg-gray-100 p-4 py-8 font-sans">
                <div className="max-w-4xl mx-auto">
                  
                  <div className="bg-white rounded-2xl shadow-sm p-8 mb-8 text-center border-t-8 border-blue-600">
                    <h1 className="text-3xl font-bold text-gray-800 mb-2">Test Yakunlandi!</h1>
                    <p className="text-gray-500 mb-6">Diagnostika natijalaringiz bilan tanishing.</p>
                    
                    <div className="bg-blue-50 p-4 rounded-xl mb-8 inline-block border border-blue-100 min-w-[250px]">
                      <h2 className="text-2xl font-bold text-blue-900">{lastName} {firstName}</h2>
                    </div>
                    
                    <div className="flex flex-wrap justify-center gap-8 mb-8">
                      <div className="bg-gray-50 p-6 rounded-xl border w-48 shadow-sm">
                        <div className="text-4xl font-bold text-gray-800">{correctAnswers} / 50</div>
                        <div className="text-gray-500 mt-2">To'g'ri javoblar</div>
                      </div>
                      <div className="bg-gray-50 p-6 rounded-xl border w-48 shadow-sm">
                        <div className="text-4xl font-bold text-blue-600">{totalPoints}</div>
                        <div className="text-gray-500 mt-2">To'plangan ball</div>
                      </div>
                    </div>

                    <h2 className="text-xl font-medium text-gray-700">
                      Natija: <span className={`font-bold ${colorClass}`}>{category}</span>
                    </h2>
                    
                    <button 
                      onClick={() => setAppState('intro')}
                      className="mt-8 px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl transition shadow"
                    >
                      Bosh sahifaga qaytish
                    </button>

                    <div className="mt-8 text-center text-sm text-gray-500 border-t pt-6">
                      <p className="font-semibold text-gray-700">Yaratuvchi: Akmaljon Jo'raqo'ziyev</p>
                      <p>Telegram: <a href="https://t.me/akmalmaths" target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">@akmalmaths</a> va <a href="https://t.me/maktabdarsibot" target="_blank" rel="noopener noreferrer" className="text-blue-600 hover:underline">@maktabdarsibot</a></p>
                    </div>
                  </div>

                  <h3 className="text-2xl font-bold text-gray-800 mb-6">Savollar tahlili</h3>
                  <div className="space-y-4">
                    {testQuestions.map((q, idx) => {
                      const userAnswer = answers[idx];
                      const isCorrect = userAnswer === q.correct;
                      const isUnanswered = userAnswer === null;

                      return (
                        <div key={idx} className={`bg-white rounded-xl shadow-sm p-6 border-l-4 ${isCorrect ? 'border-green-500' : isUnanswered ? 'border-gray-400' : 'border-red-500'}`}>
                          <div className="flex gap-4">
                            <div className="font-bold text-gray-500">{idx + 1}.</div>
                            <div className="flex-1">
                              <div className="text-sm font-bold text-blue-600 mb-1">{q.subject}</div>
                              <p className="font-medium text-gray-800 mb-4">{q.question}</p>
                              
                              <div className="space-y-2">
                                {q.options.map((opt, optIdx) => {
                                  const isThisCorrect = optIdx === q.correct;
                                  const isThisSelected = optIdx === userAnswer;
                                  
                                  let bgClass = "bg-gray-50 text-gray-600";
                                  if (isThisCorrect) bgClass = "bg-green-100 text-green-800 border border-green-300 font-bold";
                                  else if (isThisSelected && !isThisCorrect) bgClass = "bg-red-100 text-red-800 border border-red-300";

                                  return (
                                    <div key={optIdx} className={`p-3 rounded-lg flex items-center gap-3 ${bgClass}`}>
                                      <span>{['A', 'B', 'C', 'D'][optIdx]})</span>
                                      {opt}
                                      {isThisCorrect && <span className="ml-auto text-green-600">✓ To'g'ri javob</span>}
                                      {isThisSelected && !isThisCorrect && <span className="ml-auto text-red-600">✗ Sizning javobingiz</span>}
                                    </div>
                                  );
                                })}
                              </div>
                              
                              {isUnanswered && (
                                <div className="mt-3 text-sm text-red-500 font-medium">Bu savolga javob berilmagan.</div>
                              )}
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>

                </div>
              </div>
            );
          }

          return null;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
