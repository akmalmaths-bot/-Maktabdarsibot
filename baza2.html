<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Umumiy Reyting Paneli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f1f5f9; }
        .tab-btn.active { background-color: #2563eb; color: white; border-color: #2563eb; }
        .tab-btn { background-color: white; color: #475569; border-color: #e2e8f0; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-blue-700 text-white shadow-md sticky top-0 z-20">
        <div class="max-w-6xl mx-auto px-3 sm:px-4 py-3 sm:py-5 flex items-center justify-between">
            <div class="flex items-center gap-2 sm:gap-3">
                <span class="text-2xl sm:text-3xl">🏆</span>
                <h1 class="text-base sm:text-xl md:text-2xl font-bold tracking-wide">Maktab Reytingi</h1>
            </div>
            <div id="connection-status" class="flex items-center gap-1.5 sm:gap-2 text-[10px] sm:text-sm font-medium bg-blue-800 px-2 py-1 sm:px-3 sm:py-1.5 rounded-full">
                <span class="relative flex h-2 w-2 sm:h-3 sm:w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-yellow-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-2 w-2 sm:h-3 sm:w-3 bg-yellow-500"></span>
                </span>
                Ulanmoqda...
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-6xl mx-auto w-full px-2 sm:px-4 py-4 sm:py-8">
        
        <div class="text-center mb-4 sm:mb-6">
            <h2 class="text-xl sm:text-2xl md:text-3xl font-bold text-slate-800 mb-1 sm:mb-2">O'quvchilar Reytingi</h2>
            <p class="text-xs sm:text-sm text-slate-500">Sinf va test qismini tanlab natijalarni ko'ring</p>
        </div>

        <!-- FILTR QISMI -->
        <div class="flex flex-row justify-center items-center gap-2 sm:gap-4 mb-4 sm:mb-8 bg-white p-2 sm:p-4 rounded-xl sm:rounded-2xl shadow-sm border border-slate-200">
            <div class="flex flex-col w-1/2 sm:w-auto">
                <label class="text-[10px] sm:text-xs font-bold text-slate-500 uppercase ml-1 mb-1">Sinf</label>
                <select id="class-select" class="px-2 sm:px-4 py-2 sm:py-3 rounded-lg sm:rounded-xl border-2 border-slate-200 font-bold text-xs sm:text-sm text-blue-700 bg-slate-50 outline-none focus:border-blue-500 cursor-pointer w-full sm:w-40">
                    <option value="1-sinf">1-sinf</option>
                    <option value="2-sinf">2-sinf</option>
                    <option value="3-sinf">3-sinf</option>
                    <option value="4-sinf">4-sinf</option>
                    <option value="5-sinf">5-sinf</option>
                    <option value="6-sinf">6-sinf</option>
                    <option value="PM">PM Tayyorlov</option>
                </select>
            </div>
            
            <div class="flex flex-col w-1/2 sm:w-auto">
                <label class="text-[10px] sm:text-xs font-bold text-slate-500 uppercase ml-1 mb-1">Qism</label>
                <select id="part-select" class="px-2 sm:px-4 py-2 sm:py-3 rounded-lg sm:rounded-xl border-2 border-slate-200 font-bold text-xs sm:text-sm text-orange-600 bg-slate-50 outline-none focus:border-orange-500 cursor-pointer w-full sm:w-40">
                    <option value="6-qism" selected>6-qism</option>
                    <option value="7-qism">7-qism</option>
                    <option value="8-qism">8-qism</option>
                    <option value="9-qism">9-qism</option>
                    <option value="10-qism">10-qism</option>
                    <option value="11-qism">11-qism</option>
                    <option value="12-qism">12-qism</option>
                </select>
            </div>
        </div>

        <!-- Leaderboard Board -->
        <div class="bg-white rounded-xl sm:rounded-2xl shadow-sm border border-slate-200 overflow-hidden relative min-h-[300px] sm:min-h-[400px]">
            
            <!-- Loading Overlay -->
            <div id="loading-overlay" class="absolute inset-0 bg-white/90 backdrop-blur-sm z-10 flex flex-col justify-center items-center p-4 text-center">
                <div class="w-8 h-8 sm:w-12 sm:h-12 border-4 border-blue-200 border-t-blue-600 rounded-full animate-spin mb-3 sm:mb-4" id="spinner"></div>
                <div id="error-message-box">
                    <p class="text-xs sm:text-sm text-slate-600 font-medium animate-pulse">Yuklanmoqda...</p>
                </div>
            </div>

            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse min-w-[320px]">
                    <thead>
                        <tr class="bg-slate-50 border-b border-slate-200 text-slate-500 text-[10px] sm:text-sm uppercase tracking-wider">
                            <th class="py-2 sm:py-4 px-2 sm:px-6 text-center font-bold w-10 sm:w-20">#</th>
                            <th class="py-2 sm:py-4 px-2 sm:px-6 font-bold">O'quvchi</th>
                            <th class="py-2 sm:py-4 px-2 sm:px-6 text-center font-bold">Javob</th>
                            <th class="py-2 sm:py-4 px-2 sm:px-6 text-center font-bold">⭐</th>
                            <th class="py-2 sm:py-4 px-2 sm:px-6 text-right font-bold hidden sm:table-cell">Vaqt</th>
                        </tr>
                    </thead>
                    <tbody id="leaderboard-body" class="divide-y divide-slate-100">
                    </tbody>
                </table>
            </div>
            
            <!-- Empty State -->
            <div id="empty-state" class="hidden flex flex-col items-center justify-center py-10 sm:py-16 text-center px-4">
                <div class="text-4xl sm:text-6xl mb-2 sm:mb-4 grayscale opacity-50">📭</div>
                <h3 class="text-base sm:text-xl font-bold text-slate-700 mb-1">Natijalar yo'q</h3>
                <p class="text-xs sm:text-sm text-slate-500">Siz tanlagan sinf va qism bo'yicha hozircha ma'lumot yo'q.</p>
            </div>
        </div>

    </main>

    <footer class="bg-slate-800 text-slate-400 py-4 sm:py-6 text-center text-[10px] sm:text-sm mt-auto">
        <p>Boshlang'ich ta'lim interaktiv onlayn reyting tizimi. @akmalmaths</p>
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Boshlang'ich qiymatlar
        let currentSelectedClass = "1-sinf";
        let currentSelectedPart = "6-qism";
        let allData = [];

        const tbody = document.getElementById('leaderboard-body');
        const loadingOverlay = document.getElementById('loading-overlay');
        const emptyState = document.getElementById('empty-state');
        const connStatus = document.getElementById('connection-status');
        const errorBox = document.getElementById('error-message-box');
        const spinner = document.getElementById('spinner');
        
        const classSelect = document.getElementById('class-select');
        const partSelect = document.getElementById('part-select');

        classSelect.addEventListener('change', (e) => {
            currentSelectedClass = e.target.value;
            renderLeaderboard();
        });

        partSelect.addEventListener('change', (e) => {
            currentSelectedPart = e.target.value;
            renderLeaderboard();
        });

        const initFirebase = async () => {
            try {
                // Firebase sozlamalari
                const firebaseConfig = {
                  apiKey: "AIzaSyAkEt0HxuL62v832nMpH8D36bR28FU7dhk",
                  authDomain: "maktab-darslari.firebaseapp.com",
                  databaseURL: "https://maktab-darslari-default-rtdb.firebaseio.com",
                  projectId: "maktab-darslari",
                  storageBucket: "maktab-darslari.firebasestorage.app",
                  messagingSenderId: "375361700394",
                  appId: "1:375361700394:web:c7b74f29fb302e7743f953",
                  measurementId: "G-8S1HF14QEH"
                };
                const appId = "maktab-darslari";
                
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                const db = getFirestore(app);

                await signInAnonymously(auth);

                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        connStatus.innerHTML = `<span class="h-2 w-2 sm:h-3 sm:w-3 bg-green-400 rounded-full inline-block mr-1"></span> Ulangan`;
                        connStatus.classList.replace('bg-blue-800', 'bg-green-800');
                        
                        const leaderboardRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboards');
                        
                        onSnapshot(leaderboardRef, (snapshot) => {
                            allData = [];
                            snapshot.forEach(doc => {
                                allData.push({ id: doc.id, ...doc.data() });
                            });
                            loadingOverlay.classList.add('hidden');
                            renderLeaderboard();
                        }, (error) => {
                            console.error("Firestore o'qish xatosi:", error);
                            showError(`Baza xatosi: ${error.message}`);
                        });
                    }
                });

            } catch (error) {
                console.error("Firebase ulanish xatosi:", error);
                showError(`Ulanish xatosi: ${error.message}`);
            }
        };

        function showError(msg) {
            spinner.classList.add('hidden');
            errorBox.innerHTML = `
                <p class="text-red-600 font-bold text-sm sm:text-lg mb-1 sm:mb-2">Xatolik yuz berdi ⚠️</p>
                <div class="bg-red-50 text-red-700 text-[10px] sm:text-xs p-2 sm:p-3 rounded-lg border border-red-200 inline-block max-w-xs sm:max-w-lg text-left">
                    ${msg}
                </div>
            `;
            connStatus.innerHTML = `<span class="h-2 w-2 sm:h-3 sm:w-3 bg-red-400 rounded-full inline-block mr-1"></span> Xatolik`;
            connStatus.classList.replace('bg-blue-800', 'bg-red-800');
        }

        function renderLeaderboard() {
            let filteredData = allData.filter(item => {
                const itemPart = item.testPart || '6-qism'; 
                return item.className === currentSelectedClass && itemPart === currentSelectedPart;
            });
            
            filteredData.sort((a, b) => {
                if (b.score !== a.score) return b.score - a.score;
                if (b.stars !== a.stars) return b.stars - a.stars;
                return a.timeUsed - b.timeUsed; 
            });

            const top10 = filteredData.slice(0, 10);
            tbody.innerHTML = '';
            
            if (top10.length === 0) {
                emptyState.classList.remove('hidden');
            } else {
                emptyState.classList.add('hidden');
                
                top10.forEach((student, index) => {
                    let rankHTML = `<span class="font-bold text-slate-500">${index + 1}</span>`;
                    if (index === 0) rankHTML = `<span class="text-lg sm:text-2xl">🥇</span>`;
                    if (index === 1) rankHTML = `<span class="text-lg sm:text-2xl">🥈</span>`;
                    if (index === 2) rankHTML = `<span class="text-lg sm:text-2xl">🥉</span>`;

                    const dateObj = student.timestamp ? new Date(student.timestamp.toMillis ? student.timestamp.toMillis() : Date.now()) : new Date();
                    const timeString = `${dateObj.getHours().toString().padStart(2, '0')}:${dateObj.getMinutes().toString().padStart(2, '0')} <br class="sm:hidden"> <span class="opacity-70">${dateObj.getDate().toString().padStart(2, '0')}.${(dateObj.getMonth()+1).toString().padStart(2, '0')}</span>`;

                    const tr = document.createElement('tr');
                    tr.className = `hover:bg-blue-50 transition-colors ${index < 3 ? 'bg-amber-50/30' : 'bg-white'}`;
                    tr.innerHTML = `
                        <td class="py-2 sm:py-4 px-2 sm:px-6 text-center text-sm sm:text-base">${rankHTML}</td>
                        <td class="py-2 sm:py-4 px-2 sm:px-6 font-bold text-slate-800 text-xs sm:text-lg truncate max-w-[100px] sm:max-w-[200px]">${student.name}</td>
                        <td class="py-2 sm:py-4 px-2 sm:px-6 text-center">
                            <span class="inline-flex items-center justify-center bg-blue-100 text-blue-700 font-bold px-1.5 py-0.5 sm:px-3 sm:py-1 rounded-md sm:rounded-full text-[10px] sm:text-sm whitespace-nowrap">
                                ${student.score} / 20
                            </span>
                        </td>
                        <td class="py-2 sm:py-4 px-2 sm:px-6 text-center">
                            <span class="font-black text-yellow-500 text-xs sm:text-lg whitespace-nowrap">${student.stars} ⭐</span>
                        </td>
                        <td class="py-2 sm:py-4 px-2 sm:px-6 text-right text-[9px] sm:text-xs font-medium text-slate-400 hidden sm:table-cell">
                            ${timeString}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        document.addEventListener('DOMContentLoaded', initFirebase);
    </script>
</body>
</html>
